# 财经定制示例（聚焦股市与宏观）

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "always_on"

platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻 最热"
    - id: "wallstreetcn-quick"
      name: "华尔街见闻 快讯"
    - id: "wallstreetcn-news"
      name: "华尔街见闻 最新"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "gelonghui"
      name: "格隆汇"
    - id: "xueqiu"
      name: "雪球"
    - id: "jin10"
      name: "金十数据"
    - id: "fastbull"
      name: "快讯通"
    - id: "baidu"
      name: "百度热搜"
    - id: "toutiao"
      name: "今日头条"
    - id: "zhihu"
      name: "知乎"
    - id: "weibo"
      name: "微博"


rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 3
  feeds:
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"
    - id: "fed-monetary-policy"
      name: "美联储货币政策"
      url: "https://www.federalreserve.gov/feeds/press_monetary.xml"
    - id: "sec-press-releases"
      name: "SEC 新闻稿"
      url: "https://www.sec.gov/news/pressreleases.rss"
    - id: "bls-latest"
      name: "BLS Latest Numbers"
      url: "https://www.bls.gov/feed/bls_latest.rss"
    - id: "bls-cpi"
      name: "美国CPI"
      url: "https://www.bls.gov/feed/cpi.rss"
    - id: "bls-ppi"
      name: "美国PPI"
      url: "https://www.bls.gov/feed/ppi.rss"
    - id: "chinanews-finance"
      name: "中新网财经"
      url: "https://www.chinanews.com.cn/rss/finance.xml"
    - id: "xinhua-finance"
      name: "新华网财经"
      url: "https://www.news.cn/fortune/news_fortune.xml"
      enabled: false
    - id: "nbs-latest"
      name: "国家统计局-最新发布"
      url: "https://www.stats.gov.cn/sj/zxfb/rss.xml"
    - id: "nbs-interpretation"
      name: "国家统计局-数据解读"
      url: "https://www.stats.gov.cn/sj/sjjd/rss.xml"
    - id: "ftchinese"
      name: "FT 中文网"
      url: "https://www.ftchinese.com/rss/feed"
      enabled: false
    - id: "wsj-markets"
      name: "WSJ Markets"
      url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml"
      enabled: false
    - id: "bloomberg-cn"
      name: "彭博中国财经"
      url: "https://www.bloombergchina.com/feed/"
      enabled: false

report:
  mode: "current"
  display_mode: "keyword"
  rank_threshold: 5
  sort_by_position_first: false
  max_news_per_keyword: 0
  reverse_content_order: false

notification:
  enabled: false
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

ai_analysis:
  enabled: false

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 1000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 2000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━━━━━━━━"
