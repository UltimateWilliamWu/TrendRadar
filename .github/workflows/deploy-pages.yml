name: Deploy Pages

on:
  workflow_run:
    workflows: ["Get Hot News"]
    types:
      - completed
  push:
    branches:
      - main
      - master
    paths:
      - docs/**
      - index.html
      - output/**
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: |
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master')
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare site artifact
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site
          cp index.html _site/index.html

          if [ -f output/index.html ]; then
            mkdir -p _site/output
            cp output/index.html _site/output/index.html
          fi

          if [ -f output/html/latest/current.html ]; then
            mkdir -p _site/output/html/latest
            cp output/html/latest/current.html _site/output/html/latest/current.html
          fi

          if [ -d docs ]; then
            mkdir -p _site/docs
            cp docs/index.html _site/docs/index.html

            if [ -d docs/assets ]; then
              mkdir -p _site/docs/assets
              cp -r docs/assets/. _site/docs/assets/
            fi
          fi

          du -sh _site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
