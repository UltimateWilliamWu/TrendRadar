name: Deploy GitHub Pages

on:
  push:
    branches:
      - master   # 改成你的主分支
  workflow_dispatch:
  workflow_run:
    workflows: ["Hot News Crawler"]
    types: [completed]



permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ⚠️ 如果你的静态网站在 /output 文件夹，请保持此处
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./output

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
